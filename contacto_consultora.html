<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | ByteForce IT</title>
    <link rel="stylesheet" href="Estilos/css_consultora.css">
</head>
<body>]
    <header>
        <div class="logo">ByteForce <span>IT</span></div>
        <nav>
            <ul>
                <li><a href="consultora.html">Inicio</a></li>
                <li><a href="servicios_consultora.html">Servicios</a></li>
                <li><a href="contacto_consultora.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-form">
        <h2>Contacto</h2>
        <p>Completá el formulario y nos pondremos en contacto con vos a la brevedad.</p>

        <form action="#" method="post" class="form-contacto">
            <div class="campo">
                <label for="nombre">Nombre y Apellido:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Consulta</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2024 ByteForce IT - Grupo 08</p>
    </footer>
</body>
</html>
